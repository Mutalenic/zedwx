# Exported from Render on 2025-01-27T14:22:37Z
services:
  - type: web
    name: zedwx
    runtime: docker
    repo: https://github.com/Mutalenic/zedwx
    plan: free
    region: oregon
    buildCommand: |
      bundle install
      bundle exec rails solid_queue:install:migrations
      bundle exec rake db:migrate
    startCommand: |
      bundle exec rails db:migrate
      bundle exec rails solid_queue:start
      bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: zedwx_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: zedwx-redis
          type: redis
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: SECRET_KEY_BASE
        generateValue: true
    dependsOn:
      - zedwx_db
      - zedwx-redis

  - type: redis
    name: zedwx-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
    envVars:
      - key: REDIS_MAXMEMORY
        value: 256mb

  - type: postgres
    name: zedwx_db
    plan: free
    ipAllowList: []

databases:
  - name: zedwx_db
    databaseName: zedwx_production
    user: postgres

version: "1"
